<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellar Payment dApp</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050d1a;
    --card: rgba(10, 22, 45, 0.85);
    --border: rgba(0, 255, 200, 0.15);
    --border-hover: rgba(0, 255, 200, 0.45);
    --accent: #00ffc8;
    --accent2: #0099ff;
    --danger: #ff4f6a;
    --text: #e8f4ff;
    --muted: #5a7a99;
    --input-bg: rgba(5, 18, 38, 0.9);
    --glow: 0 0 30px rgba(0, 255, 200, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  canvas#bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .noise {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px;
  }

  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(0,255,200,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,200,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .wrapper {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 480px;
    padding: 24px;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeUp 0.8s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .header .icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 48px; height: 48px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(0,255,200,0.2), rgba(0,153,255,0.2));
    border: 1px solid var(--border);
    margin-bottom: 14px;
    font-size: 22px;
    box-shadow: 0 0 20px rgba(0,255,200,0.1);
    animation: pulse-icon 3s ease-in-out infinite;
  }

  @keyframes pulse-icon {
    0%, 100% { box-shadow: 0 0 20px rgba(0,255,200,0.1); }
    50%       { box-shadow: 0 0 35px rgba(0,255,200,0.3), 0 0 60px rgba(0,153,255,0.1); }
  }

  .header h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,255,200,0.4), transparent);
  }

  .wallet-info {
    background: rgba(0, 255, 200, 0.04);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .wallet-info::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,255,200,0.03), transparent);
    pointer-events: none;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .info-row + .info-row {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(0,255,200,0.08);
  }

  .info-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .info-value {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text);
    text-align: right;
    word-break: break-all;
  }

  .balance-val {
    font-size: 18px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,200,0.4);
    animation: balance-glow 2s ease-in-out infinite;
  }

  @keyframes balance-glow {
    0%, 100% { text-shadow: 0 0 20px rgba(0,255,200,0.3); }
    50%       { text-shadow: 0 0 35px rgba(0,255,200,0.6), 0 0 60px rgba(0,255,200,0.2); }
  }

  .section-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    letter-spacing: 0.3px;
  }

  .input-group {
    margin-bottom: 14px;
    position: relative;
  }

  .input-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
    display: block;
  }

  .input-field {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid rgba(0,255,200,0.12);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    position: relative;
  }

  .input-field::placeholder {
    color: var(--muted);
    opacity: 0.6;
  }

  .input-field:focus {
    border-color: rgba(0,255,200,0.45);
    box-shadow: 0 0 0 3px rgba(0,255,200,0.08), 0 0 20px rgba(0,255,200,0.06);
    background: rgba(0, 255, 200, 0.03);
  }

  .input-field:hover:not(:focus) {
    border-color: rgba(0,255,200,0.25);
  }

  .btn {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 15px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    position: relative;
    overflow: hidden;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .btn:hover::after { opacity: 1; }

  .btn-primary {
    background: linear-gradient(135deg, #00ffc8, #00d4a8);
    color: #001a12;
    box-shadow: 0 4px 24px rgba(0,255,200,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,255,200,0.45), 0 0 60px rgba(0,255,200,0.15);
  }

  .btn-primary:active {
    transform: translateY(0);
    box-shadow: 0 2px 12px rgba(0,255,200,0.25);
  }

  .btn-primary .btn-shimmer {
    position: absolute;
    top: 0; left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    animation: shimmer 2.5s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%   { left: -100%; }
    60%, 100% { left: 150%; }
  }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid rgba(255, 79, 106, 0.35);
    box-shadow: 0 0 0 rgba(255,79,106,0);
  }

  .btn-danger:hover {
    background: rgba(255, 79, 106, 0.08);
    border-color: rgba(255, 79, 106, 0.65);
    box-shadow: 0 0 20px rgba(255,79,106,0.15);
    transform: translateY(-1px);
  }

  .status-box {
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    line-height: 1.6;
    margin-top: 4px;
    border: 1px solid;
    animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .status-error {
    background: rgba(255, 79, 106, 0.08);
    border-color: rgba(255, 79, 106, 0.3);
    color: #ff8a9a;
  }

  .status-success {
    background: rgba(0, 255, 200, 0.07);
    border-color: rgba(0, 255, 200, 0.3);
    color: var(--accent);
  }

  .status-loading {
    background: rgba(0, 153, 255, 0.07);
    border-color: rgba(0, 153, 255, 0.3);
    color: #66c2ff;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,153,255,0.2);
    border-top-color: #0099ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .footer {
    text-align: center;
    margin-top: 20px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: fadeUp 0.8s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .net-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: net-pulse 2s ease-in-out infinite;
  }

  @keyframes net-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .connect-screen {
    text-align: center;
    padding: 16px 0;
  }

  .connect-screen p {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .copy-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
    margin-left: 6px;
  }

  .copy-btn:hover { color: var(--accent); background: rgba(0,255,200,0.08); }

  .tx-link {
    color: var(--accent2);
    text-decoration: none;
  }
  .tx-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="noise"></div>
<div class="grid-overlay"></div>

<div class="wrapper">
  <div class="header">
    <div class="icon">🚀</div>
    <h1>Stellar Payment dApp</h1>
    <p>Send XLM on Testnet</p>
  </div>

  <div class="card" id="mainCard">
    <div id="connectedView" style="display:none;">
      <div class="wallet-info">
        <div class="info-row">
          <span class="info-label">Address</span>
          <span class="info-value" id="addrDisplay">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">Balance</span>
          <span style="display:flex;align-items:center;gap:8px;">
            <span class="info-value balance-val" id="balDisplay">…</span>
            <button class="copy-btn" onclick="refreshBalance()" title="Refresh balance" style="font-size:14px;">↻</button>
          </span>
        </div>
      </div>

      <div class="section-title">Send XLM</div>

      <div class="input-group">
        <label class="input-label" for="recipient">Recipient Address</label>
        <input class="input-field" id="recipient" type="text"
          placeholder="G… (56-character Stellar address)" />
      </div>

      <div class="input-group">
        <label class="input-label" for="amount">Amount (XLM)</label>
        <input class="input-field" id="amount" type="number"
          placeholder="0.0000000" min="0.0000001" step="any" />
      </div>

      <button class="btn btn-primary" onclick="sendXLM()">
        <span class="btn-shimmer"></span>
        Send XLM
      </button>

      <button class="btn btn-danger" onclick="disconnect()">
        Disconnect Wallet
      </button>

      <div id="statusBox"></div>
    </div>

    <div id="disconnectedView">
      <div class="connect-screen">
        <div style="font-size:40px;margin-bottom:16px;">🔗</div>
        <p>Connect your Freighter wallet to<br>send and receive XLM on Testnet</p>
        <button class="btn btn-primary" onclick="connect()">
          <span class="btn-shimmer"></span>
          Connect Wallet
        </button>
        <div id="statusBox"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="net-dot"></div>
    Network: Stellar Testnet
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/11.3.0/stellar-sdk.min.js"></script>
<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, stars = [], orbs = [], warps = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); init(); });
resize();

function mkStar() {
  return { x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.2,
    a: Math.random(), da: (Math.random()-0.5)*0.005,
    vx: (Math.random()-0.5)*0.08, vy: (Math.random()-0.5)*0.08 };
}
function mkOrb() {
  const colors = [[0,255,200],[0,153,255],[120,80,255]];
  const c = colors[Math.floor(Math.random()*colors.length)];
  return { x: Math.random()*W, y: Math.random()*H, r: Math.random()*180+80,
    a: Math.random()*0.07+0.02, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
    color: c, phase: Math.random()*Math.PI*2, speed: Math.random()*0.005+0.002 };
}
function mkWarp() {
  return { x: Math.random()*W, y: Math.random()*H, angle: Math.random()*Math.PI*2,
    len: 0, maxLen: Math.random()*120+40, speed: Math.random()*4+2,
    color: Math.random()>0.5?'0,255,200':'0,153,255', done: false };
}
function init() {
  stars = Array.from({length:180}, mkStar);
  orbs  = Array.from({length:5},   mkOrb);
  warps = [];
}
let lastWarp = 0;
function draw(t) {
  ctx.clearRect(0,0,W,H);
  const bg = ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,Math.max(W,H)*.8);
  bg.addColorStop(0,'rgba(5,18,40,1)'); bg.addColorStop(1,'rgba(2,6,14,1)');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  orbs.forEach(o => {
    o.phase+=o.speed; o.x+=o.vx; o.y+=o.vy;
    if(o.x<-o.r)o.x=W+o.r; if(o.x>W+o.r)o.x=-o.r;
    if(o.y<-o.r)o.y=H+o.r; if(o.y>H+o.r)o.y=-o.r;
    const pulse = o.a+Math.sin(o.phase)*0.015;
    const g = ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
    g.addColorStop(0,`rgba(${o.color.join(',')},${pulse})`);
    g.addColorStop(1,`rgba(${o.color.join(',')},0)`);
    ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  });
  stars.forEach(s => {
    s.a+=s.da; if(s.a<=0||s.a>=1)s.da*=-1;
    s.x+=s.vx; s.y+=s.vy;
    if(s.x<0)s.x=W; if(s.x>W)s.x=0; if(s.y<0)s.y=H; if(s.y>H)s.y=0;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(180,220,255,${s.a*0.9})`; ctx.fill();
  });
  if(t-lastWarp>2200){ warps.push(mkWarp()); lastWarp=t; }
  warps.forEach(w => {
    if(w.done)return; w.len+=w.speed;
    if(w.len>=w.maxLen){w.done=true;return;}
    const fade=1-w.len/w.maxLen;
    ctx.save(); ctx.translate(w.x,w.y); ctx.rotate(w.angle);
    const lg=ctx.createLinearGradient(0,0,w.len,0);
    lg.addColorStop(0,`rgba(${w.color},0)`);
    lg.addColorStop(0.4,`rgba(${w.color},${fade*0.8})`);
    lg.addColorStop(1,`rgba(${w.color},0)`);
    ctx.strokeStyle=lg; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(w.len,0); ctx.stroke();
    ctx.restore();
  });
  warps=warps.filter(w=>!w.done);
  requestAnimationFrame(draw);
}
init(); requestAnimationFrame(draw);

const HORIZON = 'https://horizon-testnet.stellar.org';
const NETWORK_PASSPHRASE = StellarSdk.Networks.TESTNET;
const server = new StellarSdk.Horizon.Server(HORIZON);

let walletPublicKey = null;
let currentBalance  = 0;

function setStatus(html, type = 'error') {
  document.getElementById('statusBox').innerHTML =
    `<div class="status-box status-${type}">${html}</div>`;
}
function clearStatus() { document.getElementById('statusBox').innerHTML = ''; }

function hasFreighter() {
  return typeof window.freighterApi !== 'undefined' ||
         typeof window.freighter    !== 'undefined';
}
function getFreighter() {
  return window.freighterApi || window.freighter;
}

async function wrapFreighterCall(fn, retries = 3) {
  let lastError;
  for (let i = 0; i < retries; i++) {
    try {
      const result = await fn();
      if (result && result.error) {
        throw new Error(result.error.message || result.error.toString());
      }
      return result;
    } catch (e) {
      lastError = e;
      const isRetryable = e.message?.includes('message port closed') || 
                          e.message?.includes('async response') ||
                          e.message?.includes('Extension context');
      if (isRetryable && i < retries - 1) {
        await new Promise(r => setTimeout(r, 500 * (i + 1)));
      }
    }
  }
  throw lastError;
}

async function connect() {
  if (!hasFreighter()) {
    setStatus(
      '⚠ Freighter wallet not detected.<br>' +
      '<a class="tx-link" href="https://www.freighter.app/" target="_blank">Install Freighter extension</a> ' +
      'then refresh this page.',
      'error'
    );
    return;
  }

  setStatus('<div class="spinner"></div> Connecting Freighter…', 'loading');

  try {
    const freighter = getFreighter();
    
    const accessResult = await wrapFreighterCall(() => freighter.requestAccess());
    if (accessResult.error) throw new Error(accessResult.error);

    const pkResult = await wrapFreighterCall(() => freighter.getPublicKey());
    if (pkResult.error) throw new Error(pkResult.error);

    walletPublicKey = typeof pkResult === 'string' ? pkResult : pkResult.publicKey;

    document.getElementById('disconnectedView').style.display = 'none';
    document.getElementById('connectedView').style.display    = 'block';

    const short = `${walletPublicKey.slice(0,8)}…${walletPublicKey.slice(-8)}`;
    document.getElementById('addrDisplay').innerHTML =
      `<span title="${walletPublicKey}">${short}</span>
       <button class="copy-btn" onclick="copyAddr()" title="Copy full address">⎘</button>`;

    clearStatus();
    await fetchBalance();

  } catch (err) {
    setStatus(`⚠ Connection failed: ${err.message}`, 'error');
  }
}

async function fetchBalance() {
  if (!walletPublicKey) return;

  document.getElementById('balDisplay').textContent = '…';

  try {
    const account = await server.loadAccount(walletPublicKey);
    const xlmBal  = account.balances.find(b => b.asset_type === 'native');
    currentBalance = xlmBal ? parseFloat(xlmBal.balance) : 0;
    document.getElementById('balDisplay').textContent = `${currentBalance.toFixed(7)} XLM`;
  } catch (err) {
    if (err.response && err.response.status === 404) {
      document.getElementById('balDisplay').textContent = '0 XLM (unfunded)';
      setStatus(
        '⚠ Account not found on Testnet. ' +
        '<a class="tx-link" href="https://friendbot.stellar.org/?addr=' + walletPublicKey + '" target="_blank">Fund with Friendbot →</a>',
        'error'
      );
    } else {
      document.getElementById('balDisplay').textContent = 'Error';
      setStatus(`⚠ Failed to fetch balance: ${err.message}`, 'error');
    }
  }
}

async function sendXLM() {
  const to  = document.getElementById('recipient').value.trim();
  const amt = document.getElementById('amount').value.trim();

  if (!to)           { setStatus('⚠ Recipient address is required.'); return; }
  if (to.length !== 56) { setStatus('⚠ Invalid Stellar address — must be 56 characters.'); return; }
  if (!StellarSdk.StrKey.isValidEd25519PublicKey(to)) {
    setStatus('⚠ Invalid Stellar address format.'); return;
  }
  if (!amt || isNaN(amt) || parseFloat(amt) <= 0) {
    setStatus('⚠ Enter a valid amount greater than 0.'); return;
  }
  if (parseFloat(amt) > currentBalance - 1) {
    setStatus(`⚠ Insufficient balance. Available: ${(currentBalance - 1).toFixed(7)} XLM (1 XLM reserved)`);
    return;
  }
  if (!walletPublicKey) { setStatus('⚠ Wallet not connected.'); return; }

  setStatus('<div class="spinner"></div> Building transaction…', 'loading');

  try {
    const sourceAccount = await server.loadAccount(walletPublicKey);

    const transaction = new StellarSdk.TransactionBuilder(sourceAccount, {
      fee: await server.fetchBaseFee(),
      networkPassphrase: NETWORK_PASSPHRASE,
    })
      .addOperation(StellarSdk.Operation.payment({
        destination: to,
        asset: StellarSdk.Asset.native(),
        amount: parseFloat(amt).toFixed(7),
      }))
      .setTimeout(180)
      .build();

    setStatus('<div class="spinner"></div> Sign the transaction in Freighter…', 'loading');

    const freighter = getFreighter();
    const txXDR = transaction.toXDR();

    const signResult = await wrapFreighterCall(() => freighter.signTransaction(txXDR, {
      network: 'TESTNET',
      networkPassphrase: NETWORK_PASSPHRASE,
    }));

    if (signResult.error) throw new Error(signResult.error);

    const signedXDR = typeof signResult === 'string' ? signResult : signResult.signedTransaction;

    setStatus('<div class="spinner"></div> Broadcasting to Stellar Testnet…', 'loading');

    const signedTx = StellarSdk.TransactionBuilder.fromXDR(signedXDR, NETWORK_PASSPHRASE);
    const result   = await server.submitTransaction(signedTx);

    const txHash = result.hash;
    setStatus(
      `✓ Transaction successful!<br>
       Sent <strong>${parseFloat(amt).toFixed(7)} XLM</strong> to
       <strong>${to.slice(0,8)}…${to.slice(-6)}</strong><br>
       Hash: <a class="tx-link"
         href="https://stellar.expert/explorer/testnet/tx/${txHash}"
         target="_blank">${txHash.slice(0,24)}…</a>`,
      'success'
    );

    await fetchBalance();

  } catch (err) {
    let msg = err.message || 'Unknown error';
    if (err.response && err.response.data && err.response.data.extras) {
      const rc = err.response.data.extras.result_codes;
      msg = JSON.stringify(rc);
    }
    setStatus(`⚠ Transaction failed: ${msg}`, 'error');
  }
}

function disconnect() {
  walletPublicKey = null;
  currentBalance  = 0;
  document.getElementById('connectedView').style.display    = 'none';
  document.getElementById('disconnectedView').style.display = 'block';
  clearStatus();
}

function copyAddr() {
  if (!walletPublicKey) return;
  navigator.clipboard.writeText(walletPublicKey).then(() => {
    setStatus('✓ Address copied to clipboard.', 'success');
    setTimeout(clearStatus, 1500);
  });
}

function refreshBalance() { fetchBalance(); }

document.addEventListener('keydown', e => { if (e.key === 'Enter') sendXLM(); });

window.addEventListener('load', () => {
  if (!hasFreighter()) {
    setStatus(
      '⚠ Freighter wallet not detected. ' +
      '<a class="tx-link" href="https://www.freighter.app/" target="_blank">Install here →</a>',
      'error'
    );
  }
});
</script>
